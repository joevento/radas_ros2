services:
  ros2_dev:
    build: .
    container_name: ros2_jazzy_container
    network_mode: host
    volumes:
      - ./src:/ros2_ws/src
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ws_build:/ros2_ws/build
      - ws_install:/ros2_ws/install
      - ws_log:/ros2_ws/log
    environment:
      - DISPLAY=$DISPLAY
    stdin_open: true
    tty: true
    privileged: true

volumes:
  ws_build:
  ws_install:
  ws_log:
